<div class="p-1.5">

  @if (href) {
    <!-- Link item — uses routerLinkActive for automatic active state -->
    <a
      [routerLink]="href"
      routerLinkActive="bg-brand-primary-50 text-brand-primary-800"
      class="flex gap-x-2 items-center w-full px-3 py-2.5
             text-brand-dark hover:bg-brand-primary-50 hover:text-brand-primary-800
             rounded font-medium"
    >
      @if (icon) {
        <span [class]="iconClass" aria-hidden="true">{{ icon }}</span>
      }
      <span class="mr-auto">{{ title }}</span>
      <ng-content />
    </a>
  } @else {
    <!-- Button item — expandable sections or non-route actions -->
    <button
      type="button"
      class="flex gap-x-2 items-center w-full px-3 py-2.5
             text-brand-dark hover:bg-brand-primary-50 hover:text-brand-primary-800
             rounded font-medium"
      (click)="toggle()"
    >
      @if (icon) {
        <span [class]="iconClass" aria-hidden="true">{{ icon }}</span>
      }
      <span class="mr-auto">{{ title }}</span>
      @if (expandable) {
        <span class="icon-solid chevron" [class.chevron--open]="expanded" aria-hidden="true">expand_more</span>
      }
      <ng-content />
    </button>
  }

</div>
